[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health-check"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Environment variables required in Railway dashboard:
#   DATABASE_URL      — auto-set when you add the PostgreSQL plugin
#   ANTHROPIC_API_KEY — your Anthropic API key
#   OPENAI_API_KEY    — your OpenAI API key
#   GOOGLE_CLIENT_ID  — from Google Cloud Console
#   RESEND_API_KEY    — from resend.com (for email notifications)
#   EMAIL_FROM        — e.g. "Pragma <notifications@usepragma.ai>"
#   APP_URL           — production URL e.g. https://virtuous-fulfillment-production-05d3.up.railway.app

[[cron]]
name = "daily-notifications"
schedule = "0 9 * * *"
command = "python send_notifications.py"
